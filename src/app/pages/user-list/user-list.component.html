<div class="container mt-5">
  <h2>Lista Amici e Giochi</h2>
  <div class="accordion" id="accordionUtenti">
    <div class="accordion-item" *ngFor="let utente of utenti(); let i = index">
      <h2 class="accordion-header" [id]="'heading' + i">
        <button
          class="accordion-button collapsed"
          type="button"
          data-bs-toggle="collapse"
          [attr.data-bs-target]="'#collapse' + i"
          aria-expanded="false"
          [attr.aria-controls]="'collapse' + i"
        >
          {{ utente.nome | titlecase }}
        </button>
      </h2>
      <div
        [id]="'collapse' + i"
        class="accordion-collapse collapse"
        [attr.aria-labelledby]="'heading' + i"
        data-bs-parent="#accordionUtenti"
      >
        <div class="accordion-body">
          <!-- Contenitore tabella + pulsante -->
<div class="border rounded overflow-hidden" *ngIf="(utente.giochi?.length ?? 0) > 0; else nessunGioco">

  <!-- Riga con pulsante di filtro -->
  <div class="d-flex justify-content-end align-items-center px-3 py-2 border-bottom bg-dark text-white">
    <button class="btn btn-primary" (click)="apriDrawer(utente)">Filtra Giochi</button>
  </div>

  <!-- Tabella giochi -->
  <div class="table-responsive">
    <table class="table table-bordered table-striped m-0">
      <thead class="table-dark">
        <tr>
          <th>Nome</th>
          <th>Descrizione</th>
          <th>Genere</th>
          <th>Partecipanti</th>
          <th>Durata</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let gioco of utente.giochi">
          <td>{{ gioco.name }}</td>
         <!--  <td>{{ gioco.descrizione }}</td>
          <td>{{ gioco.genere }}</td>
          <td>{{ gioco.partecipantiMin }} - {{ gioco.partecipantiMax }}</td>
          <td>{{ gioco.durata }}</td> -->
        </tr>
      </tbody>
    </table>
  </div> 

</div>

          <ng-template #nessunGioco>
            <p class="text-muted">Nessun gioco associato.</p>
          </ng-template>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Drawer laterale -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="drawerFiltri" aria-labelledby="drawerLabel">
  <div class="offcanvas-header">
    <h5 id="drawerLabel">Filtra Giochi</h5>
    <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas"></button>
  </div>
  <div class="offcanvas-body">
    <form [formGroup]="filtroForm" (ngSubmit)="applicaFiltri()">
      <div class="mb-3">
        <label class="form-label">Nome</label>
        <input type="text" formControlName="nome" class="form-control" />
      </div>

      <div class="mb-3">
        <label class="form-label">Genere</label>
        <select formControlName="genere" class="form-select">
          <option value="">Tutti</option>
          <option value="strategia">Strategia</option>
          <option value="party">Party</option>
          <option value="familiare">Familiare</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Partecipanti (minimi)</label>
        <input type="number" formControlName="partecipantiMin" class="form-control" />
      </div>

      <div class="mb-3">
        <label class="form-label">Partecipanti (massimi)</label>
        <input type="number" formControlName="partecipantiMax" class="form-control" />
      </div>

      <button type="submit" class="btn btn-primary w-100">Applica</button>
    </form>
  </div>
</div>
