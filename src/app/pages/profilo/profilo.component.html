<div class="container mt-5">
  <h2>Il Mio Profilo</h2>

  <!-- Accordion che contiene il form -->
  <div class="accordion" id="accordionForm">
    <div class="accordion-item">
      <h2 class="accordion-header" id="headingForm">
        <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapseForm" aria-expanded="true" aria-controls="collapseForm">
          Aggiungi o Modifica Gioco
        </button>
      </h2>
      <div id="collapseForm" class="accordion-collapse collapse show" aria-labelledby="headingForm" data-bs-parent="#accordionForm">
        <div class="accordion-body">
          <!-- Form -->
          <form [formGroup]="giocoForm" (ngSubmit)="aggiungiGioco()" class="mb-4">
            <div class="mb-3">
              <label for="nome" class="form-label">Nome gioco</label>
              <input id="nome" type="text" formControlName="nome" class="form-control" />
            </div>

            <div class="mb-3">
              <label for="descrizione" class="form-label">Descrizione del gioco</label>
              <textarea id="descrizione" formControlName="descrizione" class="form-control"></textarea>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="partecipantiMin" class="form-label">Partecipanti Minimi</label>
                <input id="partecipantiMin" type="number" formControlName="partecipantiMin" class="form-control" />
              </div>
              <div class="col-md-6 mb-3">
                <label for="partecipantiMax" class="form-label">Partecipanti Massimi</label>
                <input id="partecipantiMax" type="number" formControlName="partecipantiMax" class="form-control" />
              </div>
            </div>

            <div class="mb-3">
              <label for="durata" class="form-label">Durata del gioco (minuti)</label>
              <input id="durata" type="number" formControlName="durata" class="form-control" />
            </div>

            <div class="mb-3">
              <label for="genere" class="form-label">Genere del gioco</label>
              <select id="genere" formControlName="genere" class="form-select">
                <option value="">Seleziona genere</option>
                <option value="strategia">Strategia</option>
                <option value="familiare">Familiare</option>
                <option value="party">Party</option>
                <option value="avventura">Avventura</option>
                <option value="altro">Altro</option>
              </select>
            </div>

            <button class="btn btn-primary me-2" type="submit">
              {{ isEditing ? 'Salva Modifiche' : 'Aggiungi Gioco' }}
            </button>
            <button *ngIf="isEditing" class="btn btn-secondary" type="button" (click)="annullaModifica()">Annulla</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="giochi.length > 0; else nessunGioco">
    <ul class="list-group">
      <li *ngFor="let gioco of giochi" class="list-group-item d-flex justify-content-between align-items-center">
        <div>
          <h5 class="mb-1">{{ gioco.nome }}</h5>
          <small>{{ gioco.descrizione }}</small><br>
          <small>Partecipanti: {{ gioco.partecipantiMin }} - {{ gioco.partecipantiMax }}</small><br>
          <small>Durata: {{ gioco.durata }} minuti</small><br>
          <small>Genere: {{ gioco.genere }}</small>
        </div>
        <div>
          <button class="btn btn-sm btn-warning me-2" (click)="modificaGioco(gioco)">Modifica</button>
          <button class="btn btn-sm btn-danger" (click)="eliminaGioco(gioco.id)">Elimina</button>
        </div>
      </li>
    </ul>
  </div>

  <ng-template #nessunGioco>
    <p class="text-muted mt-5">Nessun gioco aggiunto.</p>
  </ng-template>
</div>
